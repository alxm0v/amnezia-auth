---
- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: ansible_os_family == "Debian"

- name: Fetch AmneziaWG PPA GPG key
  ansible.builtin.get_url:
    url: "{{ amnezia_ppa_key_url }}"
    dest: /etc/apt/keyrings/amneziawg.asc
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: Determine Ubuntu release codename for Amnezia PPA
  ansible.builtin.set_fact:
    amnezia_ppa_release: "{{ ansible_distribution_release }}"
  when: ansible_os_family == "Debian"

- name: Override Amnezia PPA codename for Resolute (26.04) fallback to Noble
  ansible.builtin.set_fact:
    amnezia_ppa_release: "noble"
  when: ansible_os_family == "Debian" and ansible_distribution_release == "resolute"

- name: Add AmneziaWG PPA
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/amneziawg.asc] {{ amnezia_ppa_repo_url }} {{ amnezia_ppa_release }} main"
    state: present
    filename: amneziawg
  when: ansible_os_family == "Debian"

- name: Install AmneziaWG and iptables
  ansible.builtin.apt:
    name:
      - amneziawg-tools
      - amneziawg-dkms
      - iptables-persistent
      - python3-venv
      - python3-pip
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure AmneziaWG configuration directory exists
  ansible.builtin.file:
    path: /etc/amnezia/amneziawg
    state: directory
    mode: "0700"

- name: Generate awg0.conf from template
  ansible.builtin.template:
    src: awg0.conf.j2
    dest: /etc/amnezia/amneziawg/awg0.conf
    mode: "0600"
  notify: Restart awg-quick

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Configure NAT masquerade for VPN clients
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ vpn_subnet_cidr }}"
    jump: MASQUERADE
    comment: NAT for VPN clients
  notify: Save iptables rules

- name: Create custom iptables chains
  ansible.builtin.command: iptables -N {{ item }}
  loop:
    - AMNEZIA_FORWARD
    - AMNEZIA_AUTH
    - VPN_RULES
  register: create_chains
  failed_when: create_chains.rc != 0 and 'Chain already exists' not in create_chains.stderr
  changed_when: create_chains.rc == 0

- name: Flush chains for idempotency
  ansible.builtin.iptables:
    chain: "{{ item }}"
    flush: true
  loop:
    - AMNEZIA_FORWARD
    - VPN_RULES

- name: Enable connection logging for new VPN flows
  ansible.builtin.iptables:
    chain: VPN_RULES
    match: conntrack
    ctstate: NEW
    jump: LOG
    log_prefix: "VPN_FLOW: "
  when: logging_settings.enable_kernel_connection_logging | default(false)
  notify: Save iptables rules

- name: Populate AMNEZIA_AUTH with pre-auth subnets
  ansible.builtin.iptables:
    chain: AMNEZIA_AUTH
    source: "{{ vpn_subnet_cidr }}"
    destination: "{{ item }}"
    jump: ACCEPT
    comment: Allow VPN clients to reach pre-auth resources
  loop: "{{ preauth_allowed_subnets | default([]) }}"
  notify: Save iptables rules

- name: Populate VPN_RULES with user individual ACCEPT
  ansible.builtin.iptables:
    chain: VPN_RULES
    source: "{{ item.0.ip }}"
    destination: "{{ item.1 }}"
    jump: ACCEPT
    comment: Individual Accept for {{ item.0.name }}
  with_subelements:
    - "{{ vpn_peers }}"
    - iptables_rules.allow
    - skip_missing: true
  notify: Save iptables rules

- name: Populate VPN_RULES with user individual DENY
  ansible.builtin.iptables:
    chain: VPN_RULES
    source: "{{ item.0.ip }}"
    destination: "{{ item.1 }}"
    jump: DROP
    comment: Individual Deny for {{ item.0.name }}
  with_subelements:
    - "{{ vpn_peers }}"
    - iptables_rules.deny
    - skip_missing: true
  notify: Save iptables rules

- name: Populate VPN_RULES with global ACCEPT
  ansible.builtin.iptables:
    chain: VPN_RULES
    source: "{{ vpn_subnet_cidr }}"
    destination: "{{ item }}"
    jump: ACCEPT
    comment: Global Accept
  loop: "{{ iptables_global_rules.allow | default([]) }}"
  notify: Save iptables rules

- name: Populate VPN_RULES with global DENY
  ansible.builtin.iptables:
    chain: VPN_RULES
    source: "{{ vpn_subnet_cidr }}"
    destination: "{{ item }}"
    jump: DROP
    comment: Global Deny
  loop: "{{ iptables_global_rules.deny | default([]) }}"
  notify: Save iptables rules

- name: Apply Default Policy in VPN_RULES
  ansible.builtin.iptables:
    chain: VPN_RULES
    source: "{{ vpn_subnet_cidr }}"
    jump: "{{ iptables_default_policy }}"
    comment: Default policy for VPN_RULES
  notify: Save iptables rules

- name: Prevent peer-to-peer communication
  ansible.builtin.iptables:
    chain: AMNEZIA_FORWARD
    in_interface: "{{ vpn_interface }}"
    out_interface: "{{ vpn_interface }}"
    jump: DROP
    comment: Isolate VPN clients from each other
  notify: Save iptables rules

- name: Link AMNEZIA_FORWARD to AMNEZIA_AUTH
  ansible.builtin.iptables:
    chain: AMNEZIA_FORWARD
    source: "{{ vpn_subnet_cidr }}"
    jump: AMNEZIA_AUTH
    comment: Send VPN traffic to Auth chain
  notify: Save iptables rules

- name: Configure Drop rule for unauthorized VPN clients
  ansible.builtin.iptables:
    chain: AMNEZIA_FORWARD
    source: "{{ vpn_subnet_cidr }}"
    jump: DROP
    comment: Block all other forwarding traffic from VPN clients (Captive Portal policy)
  notify: Save iptables rules

- name: Route all VPN traffic to our custom chains
  ansible.builtin.iptables:
    chain: FORWARD
    source: "{{ vpn_subnet_cidr }}"
    jump: AMNEZIA_FORWARD
    action: insert
    rule_num: "1"
    comment: Route all VPN traffic to our custom chains
  notify: Save iptables rules

- name: Allow Input to Captive Portal
  ansible.builtin.iptables:
    chain: INPUT
    source: "{{ vpn_subnet_cidr }}"
    destination_port: "{{ captive_portal_port }}"
    protocol: tcp
    jump: ACCEPT
    comment: Allow VPN clients to reach Auth Service
  notify: Save iptables rules

- name: Create amnezia-auth group
  ansible.builtin.group:
    name: amnezia-auth
    system: true

- name: Create amnezia-auth user
  ansible.builtin.user:
    name: amnezia-auth
    group: amnezia-auth
    system: true
    shell: /bin/false
    home: "{{ app_install_dir }}"

- name: Create amnezia-daemon user
  ansible.builtin.user:
    name: amnezia-daemon
    group: amnezia-auth
    system: true
    shell: /bin/false
    home: "{{ app_install_dir }}"

- name: Configure sudoers for amnezia-daemon
  ansible.builtin.copy:
    dest: /etc/sudoers.d/amnezia-daemon
    content: |
      amnezia-daemon ALL=(root) NOPASSWD: /sbin/iptables, /sbin/iptables-save, /usr/bin/awg, /bin/cat /etc/amnezia/amneziawg/awg0.conf
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Ensure log directory exists
  ansible.builtin.file:
    path: /var/log/amnezia-auth
    state: directory
    owner: amnezia-auth
    group: amnezia-auth
    mode: '0775'
    recurse: true

- name: Ensure log files exist with shared permissions
  ansible.builtin.file:
    path: "/var/log/amnezia-auth/{{ item }}"
    state: touch
    owner: amnezia-auth
    group: amnezia-auth
    mode: '0664'
  loop:
    - audit.log
    - daemon.log
    - uvicorn.log

- name: Ensure app_install_dir directory exists
  ansible.builtin.file:
    path: "{{ app_install_dir }}"
    state: directory
    owner: amnezia-auth
    group: amnezia-auth
    mode: "0775"
    recurse: true

- name: Copy core Python app source files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../{{ item }}"
    dest: "{{ app_install_dir }}/{{ item }}"
    mode: "0644"
  with_items:
    - config.py
    - daemon.py
    - firewall.py
    - main.py
  notify:
    - Restart amnezia-auth
    - Restart amnezia-daemon

- name: Create templates directory
  ansible.builtin.file:
    path: "{{ app_install_dir }}/templates"
    state: directory
    mode: "0755"
  when: auth_mode == "totp"

- name: Copy TOTP specific files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../{{ item }}"
    dest: "{{ app_install_dir }}/{{ item }}"
    mode: "0644"
  with_items:
    - totp_routes.py
    - templates/totp_setup.html
    - templates/totp_login.html
  when: auth_mode == "totp"
  notify:
    - Restart amnezia-auth

- name: Generate requirements.txt
  ansible.builtin.template:
    src: requirements.txt.j2
    dest: "{{ app_install_dir }}/requirements.txt"
    mode: "0644"

- name: Create Python virtual environment and install requirements
  ansible.builtin.pip:
    requirements: "{{ app_install_dir }}/requirements.txt"
    virtualenv: "{{ app_install_dir }}/venv"
    virtualenv_command: python3 -m venv

- name: Write .env configuration file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_install_dir }}/.env"
    owner: amnezia-auth
    group: amnezia-auth
    mode: "0640"
  notify:
    - Restart amnezia-auth
    - Restart amnezia-daemon

- name: Install Systemd service for Captive Portal API
  ansible.builtin.template:
    src: amnezia-auth.service.j2
    dest: /etc/systemd/system/amnezia-auth.service
    mode: "0644"
  notify: Reload systemd

- name: Install Systemd service for Session Tracker Daemon
  ansible.builtin.template:
    src: amnezia-daemon.service.j2
    dest: /etc/systemd/system/amnezia-daemon.service
    mode: "0644"
  notify: Reload systemd

- name: Start and enable services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  with_items:
    - awg-quick@awg0
    - amnezia-auth
    - amnezia-daemon

- name: Install logrotate
  ansible.builtin.apt:
    name: logrotate
    state: present
  when: ansible_os_family == "Debian"

- name: Configure logrotate for amnezia-auth
  ansible.builtin.template:
    src: logrotate.j2
    dest: /etc/logrotate.d/amnezia-auth
    mode: "0644"

- name: Ensure local client_configs directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/client_configs"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true

- name: Generate client configuration templates
  ansible.builtin.template:
    src: client_conf.j2
    dest: "{{ playbook_dir }}/client_configs/{{ item.name }}.conf"
    mode: "0600"
  loop: "{{ vpn_peers }}"
  delegate_to: localhost
  become: false

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true

- name: Configure Fail2Ban filter for amnezia-portal
  ansible.builtin.template:
    src: fail2ban-filter.conf.j2
    dest: /etc/fail2ban/filter.d/amnezia-portal.conf
    mode: '0644'
  notify: Restart fail2ban

- name: Configure Fail2Ban jail
  ansible.builtin.template:
    src: fail2ban-jail.conf.j2
    dest: /etc/fail2ban/jail.local
    mode: '0644'
  notify: Restart fail2ban

- name: Start and enable fail2ban service
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
