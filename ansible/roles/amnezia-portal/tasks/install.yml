---
- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: ansible_facts['os_family'] == "Debian"

- name: Fetch AmneziaWG PPA GPG key
  ansible.builtin.get_url:
    url: "{{ amnezia_ppa_key_url }}"
    dest: /etc/apt/keyrings/amneziawg.asc
    mode: '0644'
  when: ansible_facts['os_family'] == "Debian"

- name: Determine Ubuntu release codename for Amnezia PPA
  ansible.builtin.set_fact:
    amnezia_ppa_release: "{{ ansible_facts['distribution_release'] }}"
  when: ansible_facts['os_family'] == "Debian"

- name: Override Amnezia PPA codename for Resolute (26.04) fallback to Noble
  ansible.builtin.set_fact:
    amnezia_ppa_release: "noble"
  when: ansible_facts['os_family'] == "Debian" and ansible_facts['distribution_release'] == "resolute"

- name: Add AmneziaWG PPA
  ansible.builtin.deb822_repository:
    name: amneziawg
    types: deb
    uris: "{{ amnezia_ppa_repo_url }}"
    suites: "{{ amnezia_ppa_release }}"
    components: main
    signed_by: /etc/apt/keyrings/amneziawg.asc
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: Install AmneziaWG and iptables
  ansible.builtin.apt:
    name:
      - amneziawg-tools
      - amneziawg-dkms
      - iptables-persistent
      - python3-venv
      - python3-pip
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Debian"
