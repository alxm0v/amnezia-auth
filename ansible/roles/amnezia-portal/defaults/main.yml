---
# Network configuration
vpn_interface: awg0
vpn_subnet_cidr: 10.0.42.0/24
vpn_server_ip: 10.0.42.1
vpn_port: 51820

# Application Configuration
app_install_dir: /opt/amnezia-auth
use_systemd_credentials: false

# Repository Configuration
amnezia_ppa_key_url: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x75C9DD72C799870E310542E24166F2C257290828"
amnezia_ppa_repo_url: "https://ppa.launchpadcontent.net/amnezia/ppa/ubuntu"

# AmneziaWG Parameters (Obfuscation)
awg_obfuscation_settings: |
  Jc = 128
  Jmin = 41
  Jmax = 42
  S1 = 0
  S2 = 0
  S3 = 0
  S4 = 0
  H1 = 3420716614
  H2 = 1256372134
  H3 = 651239846
  H4 = 1531398231
  I1 =
  I2 =
  I3 =
  I4 =
  I5 =

# Server Keys (SHOULD BE OVERRIDDEN BY ANSIBLE VAULT)
server_private_key: REPLACE_ME_SERVER_PRIVATE_KEY

# Authentication Mode: "oidc" or "totp"
auth_mode: oidc

# Pre-auth Configuration
preauth_allowed_subnets: [] # IPs/Subnets allowed before OIDC authorization (e.g. OIDC Provider IPs)
captive_portal_port: 8000
use_reverse_proxy: false
oidc_client_id: amnezia-auth
oidc_client_secret: REPLACE_ME
oidc_discovery_url: https://auth.dreidelpay.com/.well-known/openid-configuration

# IaC Peer list. Each peer requires a name, static IP in the subnet, and public_key.
# iptables_rules (allow/deny) are optional.
vpn_peers: []
# Example:
# - name: "alice-laptop"
#   ip: "10.0.42.5"
#   public_key: "alice_pub_key_base64="
#   iptables_rules:
#     allow: []
#     deny: []

# Granular iptables access control
iptables_default_policy: DROP
iptables_global_rules:
  allow: []
  deny: []

# Audit Logging Configuration
logging_settings:
  enable_audit_logging: true
  enable_kernel_connection_logging: false
  handshake_silence_threshold_seconds: 3600

# Fail2Ban Configuration
fail2ban:
  portal_maxretry: 10
  portal_findtime: 60
  portal_bantime: 3600
  sshd_maxretry: 5
  sshd_bantime: 3600
