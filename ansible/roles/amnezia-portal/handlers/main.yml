---
- name: Restart awg-quick
  ansible.builtin.systemd:
    name: awg-quick@awg0
    state: restarted

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart amnezia-auth
  ansible.builtin.systemd:
    name: amnezia-auth
    state: restarted

- name: Restart amnezia-daemon
  ansible.builtin.systemd:
    name: amnezia-daemon
    state: restarted

- name: Save iptables rules
  ansible.builtin.command: netfilter-persistent save
  changed_when: true
  when: ansible_facts['os_family'] == "Debian"

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
